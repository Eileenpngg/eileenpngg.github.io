<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ site.description }}">

  <title>
    {%- if page.title -%}
      {{ page.title }} — {{ site.author.name }}
    {%- else -%}
      {{ site.author.name }} — Cybersecurity
    {%- endif -%}
  </title>

  <link rel="canonical" href="{{ page.url | prepend: site.url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  {% seo %}
</head>
<body>

  <!-- ==============================
       NAVIGATION
       ============================== -->
  <nav class="site-nav" aria-label="Site navigation">
    <div class="nav-inner">

      <a href="{{ '/' | relative_url }}" class="nav-logo"
         aria-label="{{ site.author.name }} — home">~/{{ site.author.github_username }}.github.io</a>

      <button class="nav-toggle"
              aria-label="Toggle navigation"
              aria-expanded="false"
              aria-controls="nav-links"
              id="nav-toggle">
        <span></span><span></span><span></span>
      </button>

      <ul class="nav-links" id="nav-links" role="list">
        <li><a href="{{ '/#about' | relative_url }}">About</a></li>
        <li><a href="{{ '/projects' | relative_url }}">Projects</a></li>
        <li><a href="{{ '/writeups' | relative_url }}">Write-ups</a></li>
        <li><a href="{{ '/contact' | relative_url }}">Contact</a></li>
        <li><a href="{{ '/contact' | relative_url }}" class="btn-hire">Hire me</a></li>
      </ul>

    </div>
  </nav>

  <!-- ==============================
       PAGE CONTENT
       ============================== -->
  <main id="main-content">
    {{ content }}
  </main>

  <!-- ==============================
       FOOTER
       ============================== -->
  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-left">{{ site.author.github_username }}.github.io &middot; built with GitHub Pages</span>
      <span class="footer-right">Singapore &middot; open to work</span>
    </div>
  </footer>

  <script>
  (function () {
    /* ── Nav toggle ── */
    var toggle = document.getElementById('nav-toggle');
    var links  = document.getElementById('nav-links');
    if (toggle && links) {
      toggle.addEventListener('click', function () {
        var open = links.classList.toggle('is-open');
        toggle.setAttribute('aria-expanded', open);
      });
      links.querySelectorAll('a').forEach(function (a) {
        a.addEventListener('click', function () {
          links.classList.remove('is-open');
          toggle.setAttribute('aria-expanded', 'false');
        });
      });
    }

    /* ── Scroll reveal ── */
    if ('IntersectionObserver' in window) {
      var revealObserver = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            revealObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.12 });

      document.querySelectorAll('.reveal, .reveal-group').forEach(function (el) {
        revealObserver.observe(el);
      });
    } else {
      /* Fallback: show everything immediately */
      document.querySelectorAll('.reveal, .reveal-group').forEach(function (el) {
        el.classList.add('is-visible');
      });
    }

    /* ── Stat counter animation ── */
    function animateCount(el) {
      var raw    = el.getAttribute('data-count');
      var suffix = el.getAttribute('data-suffix') || '';
      var target = parseInt(raw, 10);
      if (isNaN(target)) return;

      var duration = 900; // ms
      var start    = null;

      function step(timestamp) {
        if (!start) start = timestamp;
        var progress = Math.min((timestamp - start) / duration, 1);
        /* Ease-out cubic */
        var eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.round(eased * target) + suffix;
        if (progress < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    if ('IntersectionObserver' in window) {
      var statObserver = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.querySelectorAll('[data-count]').forEach(animateCount);
            statObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.3 });

      var statsSection = document.querySelector('.stats');
      if (statsSection) statObserver.observe(statsSection);
    }

  })();
  </script>

</body>
</html>
